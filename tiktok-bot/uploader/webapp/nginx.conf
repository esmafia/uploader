server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static Vite bundle
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API calls to the FastAPI container.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSE needs buffering OFF or the client sees silence until nginx's buffer
    # fills up. Applies to the login events endpoint specifically.
    location ~ ^/api/login/browser/.*/events$ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # noVNC (websocket + HTML) — user's browser connects here via iframe src.
    location /novnc/ {
        proxy_pass http://novnc:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Raw websockify path for noVNC's websocket.
    location /websockify {
        proxy_pass http://novnc:6080/websockify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
